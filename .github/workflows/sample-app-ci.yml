name: Sample App CI

on:
  push:
    branches: [main]
    paths:
      - 'cicd/examples/sample-app/**'
      - '.github/workflows/sample-app-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cicd/examples/sample-app/**'
      - '.github/workflows/sample-app-ci.yml'

defaults:
  run:
    working-directory: cicd/examples/sample-app

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: cicd/examples/sample-app/go.sum
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: cicd/examples/sample-app

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: cicd/examples/sample-app/go.sum
      - name: Verify dependencies
        run: go mod verify
      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...
      - name: Show coverage
        run: go tool cover -func=coverage.out
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: cicd/examples/sample-app/coverage.out

  build:
    name: Build
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: cicd/examples/sample-app/go.sum
      - name: Build binary
        run: go build -o bin/app .
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: app-binary
          path: cicd/examples/sample-app/bin/app
